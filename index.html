<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecionando...</title>
    <script>
        // ESCREVA O ENDEREÇO DE DESTINO APENAS AQUI:
        const destino = "https://quantimportbrazil.github.io/cplx_port_rs_paises_fora_do_golfo_persico_adubos_ficut3_feateng0_fi_cut_reduc0.001_fev_26/";

        // Executa o redirecionamento
        window.location.href = destino;

        // Atualiza o link de fallback automaticamente ao carregar a página
        window.onload = function() {
            document.getElementById("fallback-link").href = destino;
            document.getElementById("fallback-link").innerText = destino;
        };
    </script>
</head>
<body>
    <p>Você está sendo redirecionado para: 
        <a id="fallback-link" href="#">Carregando...</a>
    </p>
</body>
</html>
